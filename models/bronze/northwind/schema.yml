        tests: [not_null]
      - name: source_file
        description: "Full source file path from input_file_name()."
        tests: [not_null]
      - name: OrderID
        description: "FK to Orders."
        tests:
          - not_null
          - relationships:
              to: ref('bronze_orders')
              field: OrderID
      - name: ProductID
        description: "FK to Products."
        tests:
          - not_null
          - relationships:
              to: ref('bronze_products')
              field: ProductID
      - name: UnitPrice
        description: "Unit price."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: Quantity
        description: "Quantity."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: Discount
        description: "Discount ratio between 0 and 1."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [source_file, load_date, OrderID, ProductID]

