version: 2

models:

  # ==========================================================
  # 01 Alphabetical_list_of_products
  # ==========================================================
  - name: bronze_alphabetical_list_of_products
    description: "Bronze dataset for Northwind: Alphabetical_list_of_products (view-like)."
    columns:
      - name: load_date
        description: "Date extracted from file path (YYYY-MM-DD)."
        tests: [not_null]
      - name: source_file
        description: "Full source file path from input_file_name()."
        tests: [not_null]
      - name: ProductID
        description: "Reference to Products (if present)."
        tests:
          - relationships:
              to: ref('bronze_products')
              field: ProductID
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [source_file,load_date,ProductID]

  # ==========================================================
  # 02 Categories
  # ==========================================================
  - name: bronze_categories
    description: "Bronze raw table for Northwind: Categories."
    columns:
      - name: load_date
        description: "Date extracted from file path (YYYY-MM-DD)."
        tests: [not_null]
      - name: source_file
        description: "Full source file path from input_file_name()."
        tests: [not_null]
      - name: CategoryID
        description: "Category primary key."
        tests: [not_null]
      - name: CategoryName
        description: "Category name."
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
          combination_of_columns: [source_file, load_date, CategoryID]

  # ==========================================================
  # 03 Category_Sales_for_1997
