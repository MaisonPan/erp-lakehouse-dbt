name: dbt-ci

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt-databricks
        run: |
          pip install --upgrade pip
          pip install dbt-databricks

      - name: Create profiles.yml (dev)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          default:
            target: dev
            outputs:
              dev:
                type: databricks
                catalog: "${DBT_CATALOG}"
                schema: "${DBT_SCHEMA}"
                host: "${DATABRICKS_HOST}"
                http_path: "${DATABRICKS_HTTP_PATH}"
                token: "${DATABRICKS_TOKEN}"
                threads: 4
          EOF
        env:
          DBT_CATALOG: ${{ vars.DBT_CATALOG }}
          DBT_SCHEMA: ${{ vars.DBT_SCHEMA_DEV }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: dbt deps
        run: dbt deps

      - name: dbt debug
        run: dbt debug -t dev

      - name: Create artifacts folder
        run: mkdir -p artifacts

      - name: Download baseline manifest
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: cd.yml
          name: baseline-manifest
          path: artifacts
          branch: main
          if_no_artifact_found: warn

      - name: List impacted models
        id: impacted
        run: |
          if [ -f artifacts/manifest.json ]; then
            dbt ls -t dev --select state:modified+ --defer --state artifacts > impacted_models.txt || true
          else
            echo "No baseline manifest found" > impacted_models.txt
          fi

          echo "Impacted models:"
          cat impacted_models.txt || true

      - name: dbt build (slim ci)
        run: |
          if [ -f artifacts/manifest.json ]; then
            dbt build -t dev --fail-fast --select state:modified+ --defer --state artifacts
          else
            echo "No baseline manifest found, fallback to full build"
            dbt build -t dev --fail-fast
          fi

      - name: Generate dbt docs (dev)
        run: dbt docs generate -t dev

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-ci-artifacts
          path: |
            target/manifest.json
            target/catalog.json
            target/run_results.json
            target/index.html

      - name: Create PR comment body
        run: |
          {
            echo "## dbt CI Summary"
            echo ""
            if [ -f artifacts/manifest.json ]; then
              echo "**Mode:** Slim CI"
            else
              echo "**Mode:** Full build fallback"
            fi
            echo ""
            echo "### Impacted models"
            echo '```'
            cat impacted_models.txt
            echo '```'
            echo ""
            echo "### Artifacts generated"
            echo "- manifest.json"
            echo "- catalog.json"
            echo "- run_results.json"
            echo "- dbt docs (index.html)"
          } > pr_comment.md

      - name: Sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr_comment.md